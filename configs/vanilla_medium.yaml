
model:
  attention_type: vanilla
  pe_type: sinusoidal
  n_layers: 16
  n_heads: 8
  d_model: 512
  d_ff: 1024
  vocab_size: 50257
  max_seq_len: 1024
  dropout: 0.1
  pre_norm: true
  ffn_type: relu
  attention_kwargs: {}
  gradient_checkpointing: true

training:
  max_tokens: 1_000_000_000 # 1B tokens
  batch_size: 12
  lr: 3.0e-4
  warmup_steps: 500
  eval_interval: 10_000_000     # eval every 10M tokens
  checkpoint_interval: 100_000_000
  weight_decay: 0.1
  grad_clip: 1.0
  label_smoothing: 0.0
  seed: 42 
  max_eval_tokens: 5_000_000
  grad_accum_steps: 16
  mixed_precision: true
  compile: true


data:
  dataset_path: data/
  tokenizer_path: tokenizer/
  train_ratio: 0.95
  num_workers: 4

wandb:
  project: dl-from-scratch-lm
  run_name: vanilla-medium
  tags: [vanilla, sinusoidal, medium, 1B-tokens]
  log_every_steps: 2
  log_attention_every: 100
  watch_model: false
