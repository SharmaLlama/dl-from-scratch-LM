# Vanilla attention — small config for fast iteration and debugging.
# Token budget: 100M tokens (~4 minutes on 2x GPU with bs=4, seq=256)

model:
  attention_type: vanilla
  pe_type: sinusoidal
  n_layers: 4
  n_heads: 4
  d_model: 256
  d_ff: 1024
  vocab_size: 50257
  max_seq_len: 256
  dropout: 0.1
  pre_norm: true
  ffn_type: relu
  attention_kwargs: {}

training:
  max_tokens: 20_000_000       # 100M tokens
  batch_size: 32
  lr: 3.0e-4
  warmup_steps: 200
  eval_interval: 1_000_000     # eval every 10M tokens
  checkpoint_interval: 10_000_000
  weight_decay: 0.1
  grad_clip: 1.0
  label_smoothing: 0.0
  seed: 42
  max_eval_tokens: 2_000_000

data:
  dataset_path: data/
  tokenizer_path: tokenizer/
  train_ratio: 0.9
  num_workers: 4

wandb:
  project: dl-from-scratch-lm
  run_name: vanilla-small
  tags: [vanilla, sinusoidal, small, debug]
  log_every_steps: 10
  log_attention_every: 500
  watch_model: false
